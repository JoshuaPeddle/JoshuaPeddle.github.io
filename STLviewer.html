<!DOCTYPE html>
<!--https://www.viewstl.com/plugin/-->

<html>

<head>
  <meta charset="UTF-8">
  <meta name="description" content="Personal Website">
  <meta name="keywords" content="HTML, CSS, JavaScript">
  <meta name="author" content="Joshua Peddle">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewstl Javascript Plugin - Simple Example</title>
  <style>
    html {
      height: 100%;
    }

    body {
      height: 100%;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: 100% 100%;
      background-image: url('BG-min.png');
      background-color: lightblue;
    }

    h1 {
      font-family: verdana;
      text-align: center;
    }

    /* Add a black background color to the top navigation */
    .topnav {
      /*background-color: #333;*/
      overflow: hidden;
    }

    /* Style the links inside the navigation bar */
    .topnav a {
      float: left;
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }

    /* Change the color of links on hover */
    .topnav a:hover {
      background-color: #ddd;
      color: black;
    }

    /* Add a color to the active/current link */
    .topnav a.active {
      background-color: #04AA6D;
      color: white;
    }
  </style>
</head>

<body>

  <div class="topnav">
    <a class="active" href="#home">Home</a>
    <a href="#news">News</a>
    <a href="#contact">Contact</a>
    <a href="#about">About</a>
  </div>
  <!--<h1>viewstl STL viewer</h1>-->
  <div id="stl_cont" style="width:100%;height:90%;margin:100 auto;"></div>
  <script src="/Stl/stl_viewer.min.js"></script>
  <script>
    var stl_viewer = new StlViewer(
      document.getElementById("stl_cont"), {

        //auto_resize:true,
        bgcolor: "#20FAAC",
        models: [{
            filename: "AirplainMain.stl",
            color: "#ADD8E6",
            rotationx: -1.32,
            rotationy: 0,
            rotationz: -.3,
            y: .1
          }
          /*{filename:"LiftingBody.stl", color:"#ADD8E6",   rotationx:-.5,rotationy:.2,rotationz:.3},*/
          /*{filename:"Case.stl", color:"#ADD8E6",rotationx:-.5,rotationy:.2,rotationz:.3,y:.1}*/
        ]
      }
    );
  </script>

</body>

</html>
